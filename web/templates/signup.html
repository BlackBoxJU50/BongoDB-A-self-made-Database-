{% extends "layout.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; padding: 2rem 0;">
    <div class="glass-panel animate-fade" style="width: 100%; max-width: 500px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Start Building</h2>
        <p style="text-align: center; margin-bottom: 2rem;">Setup your BongoDB workspace in seconds.</p>
        
        <form action="/signup" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Hasib Ahmed" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="hasib@example.com" required>
            </div>
            <div class="form-group">
                <label>Master Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Profile Image (Used for Identity)</label>
                <input type="file" name="image" accept="image/*" required style="padding: 8px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Create Pro Workspace
            </button>
        </form>
    </div>
</div>
{% endblock %}
