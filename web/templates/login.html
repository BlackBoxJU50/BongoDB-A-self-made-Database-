{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel animate-fade" style="width: 100%; max-width: 450px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h2>
        
        {% if error %}<p style="color: var(--accent); margin-bottom: 1rem; text-align: center;">{{ error }}</p>{% endif %}
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>User ID (UID)</label>
                <input type="text" name="uid" placeholder="Example: Hasib-12345678" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Sign In to BongoDB
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem;">
            Don't have an account? <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
